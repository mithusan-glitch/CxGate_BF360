<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rate Your Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:     #1a1a2e;
      --muted:   #6b7280;
      --gold:    #d4a843;
      --gold-lt: #f5e6c3;
      --bg:      #faf8f4;
      --card:    #ffffff;
      --border:  #e8e2d9;
      --radius:  1.2rem;
      --star-off:#ddd6cb;
      --star-on: #d4a843;
    }

    html { font-size: 17px; -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #d4a843, transparent);
      top: -150px; right: -150px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #1a1a2e, transparent);
      bottom: -100px; left: -100px;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3rem 2.6rem 2.8rem;
      width: 100%;
      max-width: 480px;
      box-shadow:
        0 1px 2px rgba(0,0,0,0.04),
        0 8px 32px rgba(26,26,46,0.08),
        0 32px 64px rgba(26,26,46,0.05);
      animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    .header { text-align: center; margin-bottom: 2.4rem; }

    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--ink);
      line-height: 1.15;
      margin-bottom: 0.5rem;
      letter-spacing: -0.3px;
    }

    .header p {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 300;
      line-height: 1.7;
    }

    .rule {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 1.6rem 0 2rem;
    }

    .field { margin-bottom: 1.4rem; }

    .label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .label .opt {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      color: var(--muted);
      font-size: 0.78rem;
      margin-left: 0.3rem;
    }

    input[type="text"],
    input[type="tel"] {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 0.7rem;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background: var(--bg);
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input:focus {
      border-color: var(--gold);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(212,168,67,0.14);
    }

    input::placeholder { color: #c2bdb5; font-size: 0.88rem; }

    .star-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.7rem;
    }

    /* Stars: evenly distributed across full width */
    .stars {
      display: flex;
      flex-direction: row-reverse;
      justify-content: space-between;
      width: 100%;
    }

    .stars input { display: none; }

    .stars label {
      flex: 1;
      text-align: center;
      font-size: 3rem;
      color: var(--star-off);
      cursor: pointer;
      line-height: 1;
      transition: color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .stars label:active { transform: scale(0.85); }

    .stars input:checked ~ label,
    .stars label:hover,
    .stars label:hover ~ label {
      color: var(--star-on);
    }

    .stars input:checked + label { transform: scale(1.12); }

    .star-hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.5rem;
      min-height: 1.1em;
      text-align: center;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .toast {
      display: none;
      margin-top: 1.2rem;
      padding: 1rem 1.2rem;
      border-radius: 0.75rem;
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.6;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }

    .toast.error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    @media (max-width: 500px) {
      .card { padding: 2.2rem 1.4rem 2.4rem; border-radius: 1rem; }
      .header h1 { font-size: 1.7rem; }
      .stars label { font-size: 2.6rem; }
    }
  </style>
</head>
<body>

<div class="card">

  <div class="header">
    <img src="https://raw.githubusercontent.com/mithusan-glitch/Logos/refs/heads/main/BF_Logo-no_background.png"
      alt="Logo"
      style="display:block;margin:0 auto 1.2rem;width:150px;height:150px;object-fit:contain;"/>
    <h1>How was your<br/><em>experience?</em></h1>
    <p>Your feedback helps us serve you better.<br/>It only takes 10 seconds.</p>
  </div>

  <div class="rule"></div>

  <div id="feedbackForm">

    <div class="field">
      <label class="label" for="name">Your Name <span class="opt">(optional)</span></label>
      <input type="text" id="name" placeholder="e.g. Sarah M." autocomplete="name"/>
    </div>

    <div class="field">
      <label class="label" for="phone">Phone Number <span class="opt">(optional)</span></label>
      <input type="tel" id="phone" placeholder="e.g. 0449844642" autocomplete="tel" inputmode="tel"/>
    </div>

    <div class="field">
      <span class="star-label">Tap a star to rate</span>
      <div class="stars" id="starGroup">
        <input type="radio" id="s5" name="rating" value="5"/>
        <label for="s5" title="Excellent">&#9733;</label>
        <input type="radio" id="s4" name="rating" value="4"/>
        <label for="s4" title="Good">&#9733;</label>
        <input type="radio" id="s3" name="rating" value="3"/>
        <label for="s3" title="Average">&#9733;</label>
        <input type="radio" id="s2" name="rating" value="2"/>
        <label for="s2" title="Poor">&#9733;</label>
        <input type="radio" id="s1" name="rating" value="1"/>
        <label for="s1" title="Terrible">&#9733;</label>
      </div>
      <div class="star-hint" id="starHint"></div>
    </div>

  </div>

  <div class="toast" id="toastBox"></div>

</div>

<script>
  const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzx6hn0KtbanFnOXia2e4GP_ieDFCWhsU1rb4MAdofzfsdE8T4IOQsFQ129DMarqi8/exec";
  const REVIEW_URL     = "https://search.google.com/local/writereview?placeid=ChIJ1y8qGACvEmsRWMnXAfAcjzs";
  const LOW_RATING_URL = "https://forms.gle/gw2cdmh3Pr23qhTK6";
  const HIGH_RATING = 4;

  const HINTS = { 1:"Terrible", 2:"Poor", 3:"Average", 4:"Good", 5:"Excellent" };

  // Restrict phone input to digits and + only
  document.getElementById('phone').addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9+]/g, '');
  });

  // Update hint text on hover/change
  document.querySelectorAll('input[name="rating"]').forEach(function(r) {
    r.addEventListener('change', function() {
      document.getElementById('starHint').textContent = HINTS[r.value] || '';
    });
  });

  // Star click — phone is optional, so process immediately
  document.querySelectorAll('.stars label').forEach(function(lbl) {
    lbl.addEventListener('click', function() {
      var phone = document.getElementById('phone').value.trim();

      // Use a tiny delay to let the radio value update before reading it
      setTimeout(function() {
        var ratingEl = document.querySelector('input[name="rating"]:checked');
        if (!ratingEl) return;

        var rating = parseInt(ratingEl.value);
        var name = document.getElementById('name').value.trim();

        // Send to backend (fire and forget)
        var formData = new FormData();
        formData.append('name',   name);
        formData.append('phone',  phone);
        formData.append('rating', ratingEl.value);
        fetch(BACKEND_URL, { method: 'POST', body: formData }).catch(function() {});

        // Hide form
        document.getElementById('feedbackForm').style.display = 'none';

        // Blank the page to avoid a flash of content during redirect
        document.body.innerHTML = '';
        document.body.style.background = '#faf8f4';

        if (rating >= HIGH_RATING) {
          window.location.href = REVIEW_URL;
        } else {
          window.location.href = LOW_RATING_URL;
        }
      }, 50);
    });
  });
</script>
</body>
</html>
